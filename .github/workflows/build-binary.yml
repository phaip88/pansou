name: Build Binary
on:
  workflow_dispatch:
jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'
      - name: Download deps
        run: go mod download
      - name: Build linux amd64 binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -extldflags '-static'" -o dist/pansou-linux-amd64 .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pansou-linux-amd64
          path: dist/pansou-linux-amd64
          if-no-files-found: error
